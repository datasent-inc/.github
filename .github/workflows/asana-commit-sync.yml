name: Asana Commit Sync

# Posts a comment to Asana for every commit pushed to a PR branch
# that references an Asana task (via "Asana: <gid>" in commit message).
#
# Opt-in: add to specific repos where per-commit visibility is useful.
# Noisy on repos with many small commits; not recommended everywhere.

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  commit-sync:
    runs-on: ubuntu-latest
    if: github.event.forced == false
    steps:
      - name: Checkout with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse new commits for Asana refs
        id: parse
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          BRANCH: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
        run: |
          # Handle new branch (BEFORE is all zeros)
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            COMMITS=$(git log --format='%H' "$AFTER" -n 10)
          else
            COMMITS=$(git log --format='%H' "${BEFORE}..${AFTER}")
          fi

          for SHA in $COMMITS; do
            MSG=$(git log -1 --format='%B' "$SHA")
            TASK_GID=$(echo "$MSG" | grep -oiE 'asana:?[[:space:]]*([0-9]{10,})' | grep -oE '[0-9]{10,}' | head -1)
            [ -z "$TASK_GID" ] && continue

            SUBJECT=$(git log -1 --format='%s' "$SHA")
            AUTHOR=$(git log -1 --format='%an' "$SHA")
            COMMENT="Commit ${SHA:0:7} by ${AUTHOR} on ${BRANCH}: ${SUBJECT}
${REPO_URL}/commit/${SHA}"

            echo "Posting to Asana task $TASK_GID for commit $SHA"
            curl -sS -X POST "https://app.asana.com/api/1.0/tasks/${TASK_GID}/stories" \
              -H "Authorization: Bearer ${ASANA_PAT}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$COMMENT" '{data: {text: $text}}')" \
              --fail-with-body || echo "::warning::Failed to post for $SHA"
          done

name: Asana Sync (Reusable)

on:
  workflow_call:
    secrets:
      ASANA_PAT:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Asana task GID from PR body
        id: extract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Look for Asana URL in PR body or title
          # Matches: https://app.asana.com/.../task/<GID> or Asana: <GID>
          COMBINED="${PR_TITLE}"$'\n'"${PR_BODY}"
          TASK_GID=$(echo "$COMBINED" | grep -oE 'app\.asana\.com/[^ ]+/task/[0-9]+' | grep -oE '[0-9]+$' | head -1)
          if [ -z "$TASK_GID" ]; then
            TASK_GID=$(echo "$COMBINED" | grep -oiE 'asana:?[[:space:]]*([0-9]{10,})' | grep -oE '[0-9]{10,}' | head -1)
          fi
          echo "task_gid=${TASK_GID}" >> "$GITHUB_OUTPUT"
          if [ -z "$TASK_GID" ]; then
            echo "No Asana task reference found in PR - skipping sync"
          else
            echo "Found Asana task GID: $TASK_GID"
          fi

      - name: Determine action based on event
        id: action
        if: steps.extract.outputs.task_gid != ''
        env:
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          case "$ACTION" in
            opened|reopened)
              echo "asana_action=comment" >> "$GITHUB_OUTPUT"
              echo "message=PR opened: ${{ github.event.pull_request.html_url }} by @${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
              ;;
            ready_for_review)
              echo "asana_action=comment" >> "$GITHUB_OUTPUT"
              echo "message=PR ready for review: ${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"
              ;;
            closed)
              if [ "$MERGED" = "true" ]; then
                echo "asana_action=complete" >> "$GITHUB_OUTPUT"
                echo "message=PR merged: ${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"
              else
                echo "asana_action=comment" >> "$GITHUB_OUTPUT"
                echo "message=PR closed without merge: ${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "asana_action=skip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Post comment to Asana task
        if: steps.action.outputs.asana_action == 'comment' || steps.action.outputs.asana_action == 'complete'
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          TASK_GID: ${{ steps.extract.outputs.task_gid }}
          MESSAGE: ${{ steps.action.outputs.message }}
        run: |
          curl -sS -X POST "https://app.asana.com/api/1.0/tasks/${TASK_GID}/stories" \
            -H "Authorization: Bearer ${ASANA_PAT}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MESSAGE" '{data: {text: $text}}')" \
            --fail-with-body

      - name: Mark Asana task complete
        if: steps.action.outputs.asana_action == 'complete'
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          TASK_GID: ${{ steps.extract.outputs.task_gid }}
        run: |
          curl -sS -X PUT "https://app.asana.com/api/1.0/tasks/${TASK_GID}" \
            -H "Authorization: Bearer ${ASANA_PAT}" \
            -H "Content-Type: application/json" \
            -d '{"data": {"completed": true}}' \
            --fail-with-body

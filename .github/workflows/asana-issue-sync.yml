name: Asana Sync (Reusable)

# Syncs GitHub issue lifecycle events to linked Asana tasks.
#
# Architecture:
#   Asana stories/features  <-->  GitHub Issues  <--  PRs
#   (product level)                (technical)        (code)
#
# The Asana link lives on the GitHub Issue, not on PRs. Developers work
# PRs against Issues using normal "Closes #123" workflow -- no Asana
# awareness required. When a PR merges and closes the issue, this
# workflow updates the Asana task automatically.
#
# Convention: issue body contains "Asana: <gid>" or a full Asana task URL.
# This is set once when the issue is created (by PM or automation).
#
# Behavior:
#   issue opened   -> comment on Asana task
#   issue closed   -> comment + mark Asana task complete
#   issue reopened -> comment + unmark Asana task complete
#   comment added  -> optionally mirror to Asana (mirror_comments input)

on:
  workflow_call:
    inputs:
      mirror_comments:
        description: "Mirror GitHub issue comments to Asana"
        required: false
        type: boolean
        default: false
    secrets:
      ASANA_PAT:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Asana task GID from issue
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          COMBINED="${ISSUE_TITLE}"$'\n'"${ISSUE_BODY}"
          # Matches both Asana URL formats:
          #   Classic: https://app.asana.com/0/{project_gid}/{task_gid}
          #   New:     https://app.asana.com/1/{workspace}/project/{project}/task/{task_gid}
          TASK_GID=$(echo "$COMBINED" | grep -oE 'app\.asana\.com/[^ ]+/[0-9]{10,}' | grep -oE '[0-9]{10,}$' | head -1)
          if [ -z "$TASK_GID" ]; then
            TASK_GID=$(echo "$COMBINED" | grep -oiE 'asana:?[[:space:]]*([0-9]{10,})' | grep -oE '[0-9]{10,}' | head -1)
          fi
          echo "task_gid=${TASK_GID}" >> "$GITHUB_OUTPUT"
          if [ -z "$TASK_GID" ]; then
            echo "No Asana task reference found in issue -- skipping sync"
          else
            echo "Found Asana task GID: $TASK_GID"
          fi

      - name: Post comment on issue event
        if: steps.extract.outputs.task_gid != '' && github.event_name == 'issues'
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          TASK_GID: ${{ steps.extract.outputs.task_gid }}
          ACTION: ${{ github.event.action }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          USER: ${{ github.event.sender.login }}
        run: |
          case "$ACTION" in
            opened) MSG="GitHub issue opened by @${USER}: ${ISSUE_TITLE} - ${ISSUE_URL}" ;;
            closed) MSG="GitHub issue closed by @${USER}: ${ISSUE_URL}" ;;
            reopened) MSG="GitHub issue reopened by @${USER}: ${ISSUE_URL}" ;;
            *) exit 0 ;;
          esac
          curl -sS -X POST "https://app.asana.com/api/1.0/tasks/${TASK_GID}/stories" \
            -H "Authorization: Bearer ${ASANA_PAT}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MSG" '{data: {text: $text}}')" \
            --fail-with-body

      - name: Complete/reopen task based on issue state
        if: steps.extract.outputs.task_gid != '' && github.event_name == 'issues' && (github.event.action == 'closed' || github.event.action == 'reopened')
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          TASK_GID: ${{ steps.extract.outputs.task_gid }}
          ACTION: ${{ github.event.action }}
        run: |
          COMPLETED=$([ "$ACTION" = "closed" ] && echo "true" || echo "false")
          curl -sS -X PUT "https://app.asana.com/api/1.0/tasks/${TASK_GID}" \
            -H "Authorization: Bearer ${ASANA_PAT}" \
            -H "Content-Type: application/json" \
            -d "{\"data\": {\"completed\": ${COMPLETED}}}" \
            --fail-with-body

      - name: Mirror comment to Asana
        if: inputs.mirror_comments && steps.extract.outputs.task_gid != '' && github.event_name == 'issue_comment' && github.event.action == 'created'
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          TASK_GID: ${{ steps.extract.outputs.task_gid }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          USER: ${{ github.event.comment.user.login }}
        run: |
          MSG="GitHub comment by @${USER}: ${COMMENT_BODY}
Source: ${COMMENT_URL}"
          curl -sS -X POST "https://app.asana.com/api/1.0/tasks/${TASK_GID}/stories" \
            -H "Authorization: Bearer ${ASANA_PAT}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MSG" '{data: {text: $text}}')" \
            --fail-with-body
